<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Online Voting System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <h1>🗳️ Online Voting System</h1>
        <div>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Login</h2>

            <!-- Role Selection Tabs -->
            <div style="margin-bottom: 20px;">
                <button class="btn btn-primary btn-sm" onclick="showLoginForm('user')">Voter Login</button>
                <button class="btn btn-success btn-sm" onclick="showLoginForm('candidate')">Candidate Login</button>
                <button class="btn btn-secondary btn-sm" onclick="showLoginForm('admin')">Admin Login</button>
            </div>

            <div id="message"></div>

            <!-- User Login Form -->
            <form id="userLoginForm" onsubmit="handleLogin(event, 'user')">
                <h3>Voter Login</h3>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="userEmail" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="userPassword" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary">Login as Voter</button>
            </form>

            <!-- Candidate Login Form -->
            <form id="candidateLoginForm" class="hidden" onsubmit="handleLogin(event, 'candidate')">
                <h3>Candidate Login</h3>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="candidateEmail" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="candidatePassword" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-success">Login as Candidate</button>
            </form>

            <!-- Admin Login Form -->
            <form id="adminLoginForm" class="hidden" onsubmit="handleLogin(event, 'admin')">
                <h3>Admin Login</h3>
                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" id="adminUsername" required placeholder="Enter admin username">
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="adminPassword" required placeholder="Enter admin password">
                </div>
                <button type="submit" class="btn btn-secondary">Login as Admin</button>
            </form>

            <p class="mt-20">Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Show selected login form, hide others
        function showLoginForm(role) {
            document.getElementById('userLoginForm').classList.add('hidden');
            document.getElementById('candidateLoginForm').classList.add('hidden');
            document.getElementById('adminLoginForm').classList.add('hidden');
            document.getElementById(role + 'LoginForm').classList.remove('hidden');
            document.getElementById('message').innerHTML = '';
        }

        // Handle login form submission
        async function handleLogin(event, role) {
            event.preventDefault();
            let url, body;

            if (role === 'user') {
                url = '/api/user/login';
                body = {
                    email: document.getElementById('userEmail').value,
                    password: document.getElementById('userPassword').value
                };
            } else if (role === 'candidate') {
                url = '/api/candidate/login';
                body = {
                    email: document.getElementById('candidateEmail').value,
                    password: document.getElementById('candidatePassword').value
                };
            } else {
                url = '/api/admin/login';
                body = {
                    username: document.getElementById('adminUsername').value,
                    password: document.getElementById('adminPassword').value
                };
            }

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (res.ok) {
                    showMessage(data.message, 'success');
                    // Redirect to respective dashboard
                    setTimeout(() => window.location.href = data.redirect, 1000);
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (err) {
                showMessage('Connection error. Is the server running?', 'error');
            }
        }
    </script>
</body>
</html>
