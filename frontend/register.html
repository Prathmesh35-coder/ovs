<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Online Voting System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <h1>🗳️ Online Voting System</h1>
        <div>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Register</h2>

            <div style="margin-bottom: 20px;">
                <button class="btn btn-primary btn-sm" onclick="showRegForm('user')">Register as Voter</button>
                <button class="btn btn-success btn-sm" onclick="showRegForm('candidate')">Register as Candidate</button>
            </div>

            <div id="message"></div>

            <!-- User Registration Form -->
            <form id="userRegForm" onsubmit="handleRegister(event, 'user')">
                <h3>Voter Registration</h3>
                <div class="form-group">
                    <label>Full Name:</label>
                    <input type="text" id="userFullName" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="userRegEmail" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="userRegPassword" required placeholder="Create a password" minlength="6">
                </div>
                <button type="submit" class="btn btn-primary">Register as Voter</button>
            </form>

            <!-- Candidate Registration Form -->
            <form id="candidateRegForm" class="hidden" onsubmit="handleRegister(event, 'candidate')">
                <h3>Candidate Registration</h3>
                <div class="form-group">
                    <label>Full Name:</label>
                    <input type="text" id="candFullName" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="candRegEmail" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="candRegPassword" required placeholder="Create a password" minlength="6">
                </div>
                <div class="form-group">
                    <label>Description / Manifesto:</label>
                    <textarea id="candDescription" required placeholder="Describe yourself and your goals..."></textarea>
                </div>
                <button type="submit" class="btn btn-success">Register as Candidate</button>
            </form>

            <p class="mt-20">Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        function showRegForm(role) {
            document.getElementById('userRegForm').classList.add('hidden');
            document.getElementById('candidateRegForm').classList.add('hidden');
            document.getElementById(role === 'user' ? 'userRegForm' : 'candidateRegForm').classList.remove('hidden');
            document.getElementById('message').innerHTML = '';
        }

        async function handleRegister(event, role) {
            event.preventDefault();
            let url, body;

            if (role === 'user') {
                url = '/api/user/register';
                body = {
                    full_name: document.getElementById('userFullName').value,
                    email: document.getElementById('userRegEmail').value,
                    password: document.getElementById('userRegPassword').value
                };
            } else {
                url = '/api/candidate/register';
                body = {
                    full_name: document.getElementById('candFullName').value,
                    email: document.getElementById('candRegEmail').value,
                    password: document.getElementById('candRegPassword').value,
                    description: document.getElementById('candDescription').value
                };
            }

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (res.ok) {
                    showMessage(data.message, 'success');
                    event.target.reset();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (err) {
                showMessage('Connection error. Is the server running?', 'error');
            }
        }
    </script>
</body>
</html>
